<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop all plants — Terrabloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%233f6b4c'/%3E%3Cpath d='M16 24V13' stroke='%23bcd4b3' stroke-width='2.4' stroke-linecap='round'/%3E%3Cpath d='M16 15c-4 0-7-3-7-7 4 0 7 3 7 7z' fill='%236f9c6a'/%3E%3Cpath d='M16 18c4 0 7-3 7-7-4 0-7 3-7 7z' fill='%23bcd4b3'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="index.html">Home</a> / Shop</div>
      <h1 id="pageTitle">All plants & garden goods</h1>
      <p class="muted" id="pageSub">Browse the full Terrabloom collection — <span id="count"></span> items.</p>
    </div>
  </section>

  <section class="section container" style="padding-top:40px">
    <div class="toolbar">
      <div class="chips" id="chips"></div>
      <select id="sort" aria-label="Sort products">
        <option value="featured">Sort: Featured</option>
        <option value="low">Price: Low to High</option>
        <option value="high">Price: High to Low</option>
        <option value="rating">Top rated</option>
      </select>
    </div>
    <div class="product-grid" id="grid"></div>
  </section>

  <footer id="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
  boot(async () => {
    mountChrome("products");

    const query = (new URLSearchParams(location.search).get("q") || "").trim();
    let activeCat = "All";
    let sortMode = "featured";

    // reflect an active search in the page header
    if (query) {
      document.getElementById("pageTitle").textContent = `Search results`;
      document.getElementById("pageSub").innerHTML =
        `Showing <span id="count"></span> result(s) for “${query.replace(/</g, "&lt;")}” — <a href="products.html">clear search</a>.`;
    }

    // category chips
    document.getElementById("chips").innerHTML = CATEGORIES.map(c =>
      `<button class="chip ${c === "All" ? "active" : ""}" data-cat="${c}">${c}</button>`).join("");

    function matchesQuery(p) {
      if (!query) return true;
      const hay = `${p.name} ${p.category} ${p.desc}`.toLowerCase();
      return query.toLowerCase().split(/\s+/).every(term => hay.includes(term));
    }

    function render() {
      let list = PRODUCTS
        .filter(matchesQuery)
        .filter(p => activeCat === "All" || p.category === activeCat);
      if (sortMode === "low")    list = [...list].sort((a, b) => a.price - b.price);
      if (sortMode === "high")   list = [...list].sort((a, b) => b.price - a.price);
      if (sortMode === "rating") list = [...list].sort((a, b) => b.rating - a.rating);

      const grid = document.getElementById("grid");
      if (list.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="ic">${ICONS.search}</div>
            <h2>No plants found</h2>
            <p>We couldn't find anything matching your search and filters.</p>
            <a class="btn" href="products.html">View all products</a>
          </div>`;
      } else {
        grid.innerHTML = list.map(productCardHTML).join("");
      }
      document.getElementById("count").textContent = list.length;
    }

    document.getElementById("chips").addEventListener("click", e => {
      const chip = e.target.closest(".chip");
      if (!chip) return;
      activeCat = chip.dataset.cat;
      document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c === chip));
      render();
    });
    document.getElementById("sort").addEventListener("change", e => {
      sortMode = e.target.value;
      render();
    });

    render();
  });
  </script>
</body>
</html>
