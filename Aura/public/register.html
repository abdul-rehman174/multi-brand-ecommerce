<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — Aura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f6b5f'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23f6f4ef'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main class="section container">
    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Create your account</h1>
        <p class="muted">Join Aura to check out faster and keep track of your orders.</p>
        <form id="registerForm" class="auth-form">
          <div class="field"><label>Full name</label><input id="name" required placeholder="Alex Morgan"></div>
          <div class="field"><label>Email address</label><input id="email" type="email" required placeholder="you@email.com"></div>
          <div class="field"><label>Password</label><input id="password" type="password" required minlength="6" placeholder="At least 6 characters"></div>
          <div id="error" class="form-error" hidden></div>
          <button class="btn block" type="submit" id="submitBtn">Create account</button>
        </form>
        <p class="auth-alt">Already have an account? <a id="loginLink" href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
  boot(async () => {
    mountChrome("");
    const next = new URLSearchParams(location.search).get("next");
    if (next) document.getElementById("loginLink").href = "login.html?next=" + encodeURIComponent(next);
    if (Auth.isLoggedIn()) { location.href = next || "index.html"; return; }

    const form = document.getElementById("registerForm");
    const errBox = document.getElementById("error");
    form.addEventListener("submit", async e => {
      e.preventDefault();
      errBox.hidden = true;
      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.textContent = "Creating account…";
      try {
        const { token, user } = await API.post("/auth/register", {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        });
        Auth.set(token, user);
        toast("Account created — welcome to Aura!");
        setTimeout(() => (location.href = next || "index.html"), 400);
      } catch (err) {
        errBox.textContent = err.message;
        errBox.hidden = false;
        btn.disabled = false; btn.textContent = "Create account";
      }
    });
  });
  </script>
</body>
</html>
