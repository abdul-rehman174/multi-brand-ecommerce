<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My orders — Lumora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235b53ff'/%3E%3Ccircle cx='16' cy='16' r='6' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="index.html">Home</a> / My orders</div>
      <h1>My orders</h1>
      <p class="muted">Every order you've placed with Lumora, newest first.</p>
    </div>
  </section>

  <main class="section container" style="padding-top:36px">
    <div id="ordersRoot"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/api.js"></script>
  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script>
  boot(async () => {
    mountChrome("");
    if (requireLogin("orders.html")) return;

    const root = document.getElementById("ordersRoot");
    let orders = [];
    try {
      orders = await API.get("/orders", true);
    } catch (err) {
      root.innerHTML = `<div class="empty-state"><h2>Could not load orders</h2><p>${err.message}</p></div>`;
      return;
    }

    if (!orders.length) {
      root.innerHTML = `
        <div class="empty-state">
          <div class="ic">${ICONS.box}</div>
          <h2>No orders yet</h2>
          <p>When you place an order it will show up here.</p>
          <a class="btn" href="products.html">Start shopping</a>
        </div>`;
      return;
    }

    const fmtDate = s => new Date((s || "").replace(" ", "T") + "Z")
      .toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });

    root.innerHTML = orders.map(o => `
      <div class="order-card">
        <div class="order-head">
          <div>
            <div class="order-no">Order #${o.number}</div>
            <div class="muted" style="font-size:.85rem">Placed ${fmtDate(o.created_at)} · ${o.items.length} item(s)</div>
          </div>
          <div class="order-head-right">
            <span class="status-pill ${o.status.toLowerCase()}">${o.status}</span>
            <span class="order-total">${money(o.total)}</span>
          </div>
        </div>
        <div class="order-items">
          ${o.items.map(it => `
            <div class="order-line">
              <a href="product.html?id=${it.product_id}">${it.name}</a>
              <span>${money(it.price)} × ${it.qty}</span>
              <span class="line-total">${money(it.price * it.qty)}</span>
            </div>`).join("")}
        </div>
        <div class="order-foot">
          <span>Ship to: ${o.customer_name}, ${o.address}, ${o.city} ${o.zip}</span>
          <span>Subtotal ${money(o.subtotal)} · Shipping ${o.shipping === 0 ? "Free" : money(o.shipping)} · Tax ${money(o.tax)}</span>
        </div>
      </div>`).join("");
  });
  </script>
</body>
</html>
